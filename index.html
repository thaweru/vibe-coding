<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thaviru Weerasinghe | Student Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card {
            position: relative;
            width: 350px;
            padding: 35px 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            padding: 5px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            overflow: hidden;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h2 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .stream {
            display: inline-block;
            padding: 6px 18px;
            background: #ffffff;
            color: #764ba2;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .bio {
            color: rgba(255, 255, 255, 0.95);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-contact {
            display: inline-block;
            padding: 12px 30px;
            background: #ffffff;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-contact:hover {
            background: #764ba2;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img-container">
            <!-- Ensure your image file is named profile-pic.jpg/png in the same folder -->
            <img src="/profile-pic.jpg" alt="Thaviru Weerasinghe" class="profile-img">
        </div>
        <h2>Thaviru Weerasinghe</h2>
        <span class="stream">Computer Science</span>
        <p class="bio">
            A passionate student and lifelong learner who thrives on testing out the latest innovations in tech. 
            Constantly exploring new tools and frameworks to stay at the forefront of the industry.
        </p>
        <a href="#" class="btn-contact">View Portfolio</a>
    </div>

</body>
</html>
